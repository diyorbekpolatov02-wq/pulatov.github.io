# Basic Site Settings
locale                   : "en-US"
site_theme               : "contrast"
title                    : "Diyor Khazratov"
title_separator          : "-"
name                     : &name "Diyor Khazratov"
description              : &description "Medical Physicist & Researcher portfolio"
url                      : "https://diyorgit123.github.io" 
baseurl                  : "/khazratov.github.io" 
repository               : "diyorgit123/khazratov.github.io"

# Site Author
author:
  avatar           : "diyor.jpg" # images papkasiga yuklangan rasm nomi bilan bir xil bo'lishi kerak
  name             : "Diyor Khazratov"
  pronouns         : 
  bio              : "Medical Physicist | Researcher"
  location         : "Samarkand, Uzbekistan"
  employer         : "Samarkand State University"
  email            : "diyorxazratov32@gmail.com" 

  # Academic websites
  googlescholar    : "" # Agar bo'lsa linkini qo'ying
  orcid            : "" 
  researchgate     : ""
  scopus           : ""
  github           : "diyorgit123"

# Menyu va Navigatsiya sozlamalari
include:
  - .htaccess
  - _pages
  - files
  - _data
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Markdown and Sass
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed
